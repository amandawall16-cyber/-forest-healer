<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forest Healer</title>

<style>
body {
    margin: 0;
    background: #2f5e46;
    overflow: hidden;
    font-family: -apple-system;
    color: white;
}

#game {
    position: relative;
    width: 100vw;
    height: 80vh;
    background: #3e6b4f;
}

.player {
    position: absolute;
    width: 40px;
    height: 40px;
    background: pink;
    border-radius: 50%;
}

.object {
    position: absolute;
    width: 40px;
    height: 40px;
}

.controls {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 10px;
    justify-content: center;
    margin-top: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #7ecf9a;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🌿 Forest Healer</h2>
<p style="text-align:center;">Essence: <span id="essence">0</span> ✨</p>

<div id="game"></div>

<div class="controls">
    <div></div>
    <button onclick="move(0,-20)">⬆️</button>
    <div></div>
    <button onclick="move(-20,0)">⬅️</button>
    <button onclick="interact()">✨</button>
    <button onclick="move(20,0)">➡️</button>
    <div></div>
    <button onclick="move(0,20)">⬇️</button>
    <div></div>
</div>

<script>

let player = { x: 100, y: 100 };
let essence = 0;

let objects = [
    { x: 200, y: 150, type: "herb" },
    { x: 300, y: 250, type: "tree" },
    { x: 150, y: 300, type: "herb" }
];

function draw() {
    const game = document.getElementById("game");
    game.innerHTML = "";

    // player
    let p = document.createElement("div");
    p.className = "player";
    p.style.left = player.x + "px";
    p.style.top = player.y + "px";
    game.appendChild(p);

    // objects
    objects.forEach((obj, i) => {
        let o = document.createElement("div");
        o.className = "object";
        o.style.left = obj.x + "px";
        o.style.top = obj.y + "px";

        if (obj.type === "herb") o.innerText = "🌿";
        if (obj.type === "tree") o.innerText = "🌳";

        game.appendChild(o);
    });

    document.getElementById("essence").innerText = essence;
}

function move(dx, dy) {
    player.x += dx;
    player.y += dy;
    draw();
}

function interact() {
    objects = objects.filter(obj => {
        let dist = Math.hypot(player.x - obj.x, player.y - obj.y);

        if (dist < 50) {
            if (obj.type === "herb") essence += 5;
            if (obj.type === "tree") essence += 2;
            return false;
        }
        return true;
    });

    draw();
}

draw();

</script>

</body>
</html>
