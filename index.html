<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Healer</title>

<style>
body {
    margin: 0;
    font-family: -apple-system;
    background: linear-gradient(#1f3d2b, #3e6b4f);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

button {
    width: 90%;
    padding: 15px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
}

.primary { background: #7ecf9a; }
.secondary { background: #2f5e46; color: white; }

.card {
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 12px;
    margin: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 Forest Healer</h1>

<h2>Essence: <span id="essence">0</span> ✨</h2>

<div class="card">
<h3>🌾 Farm</h3>
<p>Herbs Growing: <span id="growing">0</span></p>
<button class="primary" onclick="plant()">Plant Herb (Cost 5)</button>
<button class="primary" onclick="harvest()">Harvest</button>
</div>

<div class="card">
<h3>🎒 Inventory</h3>
<p>🌿 Herbs: <span id="herbs">0</span></p>
<p>🧪 Potions: <span id="potions">0</span></p>
</div>

<div class="card">
<h3>🧪 Healing Hut</h3>
<button class="secondary" onclick="craft()">Craft Potion (5 herbs)</button>
<button class="secondary" onclick="sell()">Sell Potion (+20 essence)</button>
</div>

</div>

<script>

let essence = 0;
let herbs = 0;
let potions = 0;
let growing = 0;

function plant() {
    if (essence >= 5) {
        essence -= 5;
        growing++;
        save();
        update();
        
        setTimeout(() => {
            herbs++;
            growing--;
            save();
            update();
        }, 5000);
    }
}

function harvest() {
    // instant collect already handled by timer
}

function craft() {
    if (herbs >= 5) {
        herbs -= 5;
        potions++;
        save();
        update();
    }
}

function sell() {
    if (potions >= 1) {
        potions--;
        essence += 20;
        save();
        update();
    }
}

function update() {
    document.getElementById("essence").innerText = essence;
    document.getElementById("herbs").innerText = herbs;
    document.getElementById("potions").innerText = potions;
    document.getElementById("growing").innerText = growing;
}

function save() {
    localStorage.setItem("forestGame", JSON.stringify({
        essence, herbs, potions, growing
    }));
}

function load() {
    let data = JSON.parse(localStorage.getItem("forestGame"));
    if (data) {
        essence = data.essence;
        herbs = data.herbs;
        potions = data.potions;
        growing = data.growing;
    }
}

load();
update();

</script>

</body>
</html>
