<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forest Healer</title>

<style>
body {
    font-family: -apple-system;
    background: #2f5e46;
    color: white;
    text-align: center;
}

h1 { margin-top: 10px; }

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 20px;
}

.tile {
    background: #3e6b4f;
    border-radius: 10px;
    padding: 20px;
    font-size: 20px;
}

.empty { background: #355f45; }
.growing { background: #6bbf7a; }
.ready { background: #b6e388; }

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #7ecf9a;
    margin: 10px;
}
</style>
</head>

<body>

<h1>🌿 Forest Healer</h1>
<h2>Essence: <span id="essence">10</span> ✨</h2>

<p>Tap a tile to plant (cost 2) → wait → harvest</p>

<div class="grid" id="grid"></div>

<script>

let essence = 10;
let grid = JSON.parse(localStorage.getItem("grid")) || Array(16).fill(null);

function draw() {
    document.getElementById("essence").innerText = essence;
    let gridEl = document.getElementById("grid");
    gridEl.innerHTML = "";

    grid.forEach((tile, i) => {
        let div = document.createElement("div");
        div.classList.add("tile");

        if (!tile) {
            div.classList.add("empty");
            div.innerText = "🟫";
        } else if (tile.stage === "growing") {
            div.classList.add("growing");
            div.innerText = "🌱";
        } else {
            div.classList.add("ready");
            div.innerText = "🌾";
        }

        div.onclick = () => clickTile(i);
        gridEl.appendChild(div);
    });
}

function clickTile(i) {
    let tile = grid[i];

    if (!tile && essence >= 2) {
        essence -= 2;
        grid[i] = { stage: "growing" };
        
        setTimeout(() => {
            grid[i].stage = "ready";
            save();
            draw();
        }, 4000);

    } else if (tile && tile.stage === "ready") {
        essence += 5;
        grid[i] = null;
    }

    save();
    draw();
}

function save() {
    localStorage.setItem("grid", JSON.stringify(grid));
    localStorage.setItem("essence", essence);
}

function load() {
    let e = localStorage.getItem("essence");
    if (e) essence = parseInt(e);
}

load();
draw();

</script>

</body>
</html>
