<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Healer Idle</title>

<style>
body {
    margin: 0;
    font-family: -apple-system;
    background: linear-gradient(#1f3d2b, #3e6b4f);
    color: #f4f4f4;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

.essence {
    font-size: 24px;
    margin: 10px 0;
}

button {
    width: 90%;
    padding: 15px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
}

.tap {
    background: #7ecf9a;
}

.upgrade {
    background: #2f5e46;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 Forest Healer</h1>

<div class="essence">Essence: <span id="essence">0</span> ✨</div>

<button class="tap" onclick="tap()">Tap to Gather 🌱</button>

<h3>Upgrades</h3>

<button class="upgrade" onclick="buyHerbs()">
🌱 Herbs Lv <span id="herbLv">0</span> (+1/sec) Cost: <span id="herbCost">10</span>
</button>

<button class="upgrade" onclick="buyAnimals()">
🐄 Animals Lv <span id="animalLv">0</span> (+3/sec) Cost: <span id="animalCost">25</span>
</button>

<button class="upgrade" onclick="buySpirits()">
🍄 Spirits Lv <span id="spiritLv">0</span> (+5/sec) Cost: <span id="spiritCost">50</span>
</button>

<p>Idle Income: <span id="income">0</span>/sec</p>

</div>

<script>

let essence = 0;
let perTap = 1;
let perSecond = 0;

let herbLv = 0;
let animalLv = 0;
let spiritLv = 0;

function tap() {
    essence += perTap;
    update();
}

function buyHerbs() {
    let cost = 10 * (herbLv + 1);
    if (essence >= cost) {
        essence -= cost;
        herbLv++;
        perSecond += 1;
        update();
    }
}

function buyAnimals() {
    let cost = 25 * (animalLv + 1);
    if (essence >= cost) {
        essence -= cost;
        animalLv++;
        perSecond += 3;
        update();
    }
}

function buySpirits() {
    let cost = 50 * (spiritLv + 1);
    if (essence >= cost) {
        essence -= cost;
        spiritLv++;
        perSecond += 5;
        update();
    }
}

function update() {
    document.getElementById("essence").innerText = Math.floor(essence);
    document.getElementById("income").innerText = perSecond;

    document.getElementById("herbLv").innerText = herbLv;
    document.getElementById("animalLv").innerText = animalLv;
    document.getElementById("spiritLv").innerText = spiritLv;

    document.getElementById("herbCost").innerText = 10 * (herbLv + 1);
    document.getElementById("animalCost").innerText = 25 * (animalLv + 1);
    document.getElementById("spiritCost").innerText = 50 * (spiritLv + 1);
}

setInterval(() => {
    essence += perSecond;
    update();
}, 1000);

</script>

</body>
</html>
